services:
  - type: web
    name: treasury-management-backend
    runtime: java
    buildCommand: ./mvnw clean package -DskipTests
    startCommand: java -jar target/treasury-management-0.0.1-SNAPSHOT.jar
    envVars:
      - key: DATABASE_URL
        value: ${DATABASE_URL}
      - key: SERVER_PORT
        value: 10000