spring:
  application:
    name: university-batch-treasury

  datasource:
    url: ${DATABASE_URL}
    hikari:
      connection-timeout: 30000
      maximum-pool-size: 5

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME:cst19treasurysystem@gmail.com}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

app:
  default-monthly-contribution: 200

server:
  port: ${SERVER_PORT:10000}

# JWT & Cloudinary (keep as before)
jwt:
  secret: ${JWT_SECRET}
  expiration: 86400000

# ===================== Cloudinary =====================
cloudinary:
  cloud-name: ${CLOUDINARY_CLOUD_NAME:dpxsp2d9c}
  api-key: ${CLOUDINARY_API_KEY}
  api-secret: ${CLOUDINARY_API_SECRET}