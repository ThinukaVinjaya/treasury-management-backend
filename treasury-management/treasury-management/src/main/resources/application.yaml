spring:
  application:
    name: university-batch-treasury

  # ==================== DATABASE (Neon PostgreSQL) ====================
  datasource:
    url: jdbc:postgresql://ep-orange-brook-ai92s2ba.c-4.us-east-1.aws.neon.tech/treasury_db?sslmode=require
    username: neondb_owner
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

    hikari:
      connection-timeout: 60000
      maximum-pool-size: 5
      minimum-idle: 1
      idle-timeout: 300000
      max-lifetime: 1800000

  # ==================== JPA / Hibernate ====================
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    open-in-view: false

  # ==================== MAIL (Gmail SMTP) ====================
  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

# ==================== APP CONFIG ====================
app:
  default-monthly-contribution: 200

# ==================== SERVER ====================
server:
  port: ${PORT:10000}

# ==================== JWT ====================
jwt:
  secret: ${JWT_SECRET}
  expiration: 86400000

# ==================== CLOUDINARY ====================
cloudinary:
  cloud-name: ${CLOUDINARY_CLOUD_NAME}
  api-key: ${CLOUDINARY_API_KEY}
  api-secret: ${CLOUDINARY_API_SECRET}

# ==================== LOGGING ====================
logging:
  level:
    org.springframework.security: INFO
    org.hibernate.SQL: WARN